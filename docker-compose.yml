version: '3.8' # In recent versions, the utility no longer reads this field

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  taskiq_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.taskiq
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty default value.
        # In real deployments, this is provided via a host environment variable
        # or a root-level .env file.
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  redis_data:
